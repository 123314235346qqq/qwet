<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多轮对话助手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 420px;
      height: 90vh;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 顶部 */
    .header {
      background: #1677ff;
      color: white;
      padding: 14px 16px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      position: relative;
    }
    .header small {
      display: block;
      font-size: 11px;
      font-weight: 400;
      opacity: 0.85;
      margin-top: 4px;
    }

    /* 设置区 */
    .settings {
      padding: 10px 14px;
      background: #f0f5ff;
      border-bottom: 1px solid #d6e4ff;
      font-size: 13px;
      color: #333;
    }
    .settings label { font-weight: 500; }
    .settings input {
      width: 100%;
      margin-top: 4px;
      padding: 7px 10px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .settings input:focus { border-color: #1677ff; }
    .settings .hint {
      font-size: 11px;
      color: #999;
      margin-top: 3px;
    }

    /* 聊天区 */
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      background: #fafafa;
    }

    .msg {
      margin-bottom: 12px;
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .msg.user {
      background: #1677ff;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      background: white;
      color: #333;
      margin-right: auto;
      border: 1px solid #e8e8e8;
      border-bottom-left-radius: 4px;
    }

    .msg .role-tag {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      opacity: 0.6;
    }

    /* 输入区 */
    .input-area {
      display: flex;
      padding: 10px 14px;
      gap: 8px;
      border-top: 1px solid #eee;
      background: white;
    }
    .input-area input {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .input-area input:focus { border-color: #1677ff; }

    .btn {
      padding: 9px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary { background: #1677ff; color: white; }
    .btn-danger  { background: #ff4d4f; color: white; }

    /* 加载动画 */
    .loading {
      display: none;
      text-align: center;
      padding: 8px;
      color: #999;
      font-size: 13px;
    }
    .loading.show { display: block; }
    .dot-flash::after {
      content: '';
      animation: dots 1.2s steps(4,end) infinite;
    }
    @keyframes dots {
      0%  { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    /* 错误提示 */
    .error-msg {
      display: none;
      background: #fff2f0;
      color: #ff4d4f;
      padding: 8px 14px;
      font-size: 12px;
      border-top: 1px solid #ffccc7;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>

<div class="container">
  <!-- 标题 -->
  <div class="header">
    多轮对话助手
    <small>基于阿里云百炼 · 千问大模型</small>
  </div>

  <!-- API Key 输入 -->
  <div class="settings">
    <label>API Key（阿里云百炼）</label>
    <input type="password" id="apiKey" placeholder="粘贴你的百炼 API Key，留空则用内置Key">
    <div class="hint">获取地址：https://bailian.console.aliyun.com — 右上角「API Key管理」</div>
  </div>

  <!-- 聊天记录 -->
  <div class="chat-box" id="chatBox"></div>

  <!-- 加载提示 -->
  <div class="loading" id="loading">
    <span class="dot-flash">模型回复中</span>
  </div>

  <!-- 错误提示 -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- 输入区 -->
  <div class="input-area">
    <input type="text" id="userInput" placeholder="输入消息，按 Enter 发送…" />
    <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()">发送</button>
    <button class="btn btn-danger" onclick="clearChat()">清空</button>
  </div>
</div>

<script>
  // ========== 配置 ==========
  // 接口地址（阿里云百炼 OpenAI 兼容模式）
  const BASE_URL = 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';
  const MODEL    = 'qwen3.6-plus';   // 作业要求

  // ========== 状态 ==========
  // 对话历史（OpenAI 格式）
  let messages = [
    { role: 'system', content: '你是一个友好、专业的中文助手，回答简洁准确。' }
  ];

  const chatBox   = document.getElementById('chatBox');
  const inputEl   = document.getElementById('userInput');
  const sendBtn   = document.getElementById('sendBtn');
  const loadingEl = document.getElementById('loading');
  const errorEl   = document.getElementById('errorMsg');

  // 回车发送
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ========== 发送消息 ==========
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) { showError('请先填入阿里云百炼 API Key'); return; }

    // 显示用户消息
    appendMessage('user', text);
    messages.push({ role: 'user', content: text });
    inputEl.value = '';
    setLoading(true);
    hideError();

    try {
      const res = await fetch(BASE_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: MODEL,
          messages: messages,
          stream: false
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || '（模型未返回内容）';

      // 显示助手回复
      appendMessage('assistant', reply);
      messages.push({ role: 'assistant', content: reply });

    } catch (e) {
      showError('调用失败：' + e.message);
    } finally {
      setLoading(false);
    }
  }

  // ========== 界面辅助 ==========
  function appendMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `<div class="role-tag">${role === 'user' ? '你' : '助手'}</div>${escHtml(text)}`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function setLoading(on) {
    loadingEl.classList.toggle('show', on);
    sendBtn.disabled = on;
    inputEl.disabled = on;
  }

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add('show');
  }
  function hideError() {
    errorEl.classList.remove('show');
  }

  function clearChat() {
    messages = [
      { role: 'system', content: '你是一个友好、专业的中文助手，回答简洁准确。' }
    ];
    chatBox.innerHTML = '';
    hideError();
  }

  // 简单防 XSS
  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML.replace(/\n/g, '<br>');
  }
</script>

</body>
</html>
